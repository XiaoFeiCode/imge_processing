<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionVision</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #303133;
            --text-secondary: #606266;
            --border: #e4e7ed;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body {
            padding: 24px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .header-brand {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header-brand .accent {
            color: var(--accent);
        }

        .header-sub {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* ── Upload ── */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.25s, background 0.25s;
            background: var(--card-bg);
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: #fdf2f4;
        }

        .upload-zone input[type="file"] {
            display: none;
        }

        .upload-zone .upload-hint {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .upload-zone .upload-icon {
            font-size: 36px;
            margin-bottom: 8px;
            display: block;
        }

        /* ── Buttons ── */
        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button-row button {
            flex: 1;
            min-width: 130px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            color: #fff;
        }

        .button-row button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        .button-row button:active {
            transform: translateY(0);
        }

        .btn-upload    { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-denoise   { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .btn-classify  { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .btn-similar   { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; }

        /* ── Preview grid ── */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .preview-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            transition: transform 0.25s;
        }

        .preview-card:hover {
            transform: translateY(-4px);
        }

        .preview-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .preview-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #fafafa;
        }

        /* ── Classification result ── */
        .result-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
        }

        .result-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            min-height: 28px;
        }

        /* ── Similar grid ── */
        .similar-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .similar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        @media (max-width: 768px) {
            .similar-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .similar-grid img {
            width: 100%;
            height: 140px;
            object-fit: contain;
            border-radius: 8px;
            background: #fafafa;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .similar-grid img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ═══ Header ═══ -->
    <div class="header">
        <span class="header-brand">Fash<span class="accent">ion</span>Vision</span>
        <span class="header-sub">深度学习时尚图像分析平台</span>
    </div>

    <!-- ═══ Upload zone ═══ -->
    <label class="upload-zone" for="image-upload">
        <span class="upload-icon">📁</span>
        <span class="upload-hint">点击此处选择图片，或拖拽图片到此处</span>
        <input type="file" id="image-upload" accept="image/*">
    </label>

    <!-- ═══ Buttons ═══ -->
    <div class="button-row">
        <button id="upload-btn"    class="btn-upload">📤 上传预览</button>
        <button id="denoise-btn"   class="btn-denoise">🧹 图像去噪</button>
        <button id="classify-btn"  class="btn-classify">🔍 商品分类</button>
        <button id="similar-btn"   class="btn-similar">🖼️ 相似商品</button>
    </div>

    <!-- ═══ Preview cards ═══ -->
    <div class="preview-grid">
        <div class="preview-card">
            <h3>原始图片</h3>
            <img id="image-preview" src="" alt="等待上传">
        </div>
        <div class="preview-card">
            <h3>噪声图片</h3>
            <img id="image-noised" src="" alt="等待去噪">
        </div>
        <div class="preview-card">
            <h3>去噪结果</h3>
            <img id="image-denoising" src="" alt="等待去噪">
        </div>
    </div>

    <!-- ═══ Classification result ═══ -->
    <div class="result-section">
        <h3>分类结果</h3>
        <div class="result-text" id="result-text">—</div>
    </div>

    <!-- ═══ Similar images ═══ -->
    <div class="similar-section">
        <h3>相似商品推荐</h3>
        <div class="similar-grid" id="similar-images"></div>
    </div>

</div>

<script>
    const fileInput     = document.getElementById('image-upload');
    const imagePreview  = document.getElementById('image-preview');
    const imageNoised   = document.getElementById('image-noised');
    const imageDenoising = document.getElementById('image-denoising');
    const resultText    = document.getElementById('result-text');
    const similarGrid   = document.getElementById('similar-images');

    // ── Upload preview ──
    document.getElementById('upload-btn').onclick = function () {
        if (fileInput.files.length === 0) {
            alert('请先选择一张图片！');
            return;
        }
        const reader = new FileReader();
        reader.onload = function (e) {
            imagePreview.src = e.target.result;
        };
        reader.readAsDataURL(fileInput.files[0]);
    };

    // ── Denoise ──
    document.getElementById('denoise-btn').onclick = function () {
        if (!imagePreview.src.startsWith('data:image')) {
            alert('请先上传一张图片！');
            return;
        }
        fetch(imagePreview.src)
            .then(r => r.blob())
            .then(blob => {
                const fd = new FormData();
                fd.append('image', blob);
                return fetch('/denoising', { method: 'POST', body: fd });
            })
            .then(r => r.json())
            .then(data => {
                imageNoised.src    = 'data:image/png;base64,' + data.noisy_img;
                imageDenoising.src = 'data:image/png;base64,' + data.denoised_image;
            })
            .catch(err => console.error('去噪失败:', err));
    };

    // ── Classify ──
    document.getElementById('classify-btn').onclick = function () {
        if (!imageDenoising.src.startsWith('data:image')) {
            alert('请先执行图像去噪！');
            return;
        }
        fetch(imageDenoising.src)
            .then(r => r.blob())
            .then(blob => {
                const fd = new FormData();
                fd.append('image', blob);
                return fetch('/classification', { method: 'POST', body: fd });
            })
            .then(r => r.text())
            .then(text => { resultText.textContent = text; })
            .catch(err => console.error('分类失败:', err));
    };

    // ── Similar images ──
    document.getElementById('similar-btn').onclick = function () {
        if (!imageDenoising.src.startsWith('data:image')) {
            alert('请先执行图像去噪！');
            return;
        }
        fetch(imageDenoising.src)
            .then(r => r.blob())
            .then(blob => {
                const fd = new FormData();
                fd.append('image', blob);
                return fetch('/simimages', { method: 'POST', body: fd });
            })
            .then(r => r.json())
            .then(data => {
                similarGrid.innerHTML = '';
                data.indices_list.forEach(idx => {
                    const img = document.createElement('img');
                    img.src = 'dataset/' + idx + '.jpg';
                    similarGrid.appendChild(img);
                });
            })
            .catch(err => console.error('检索失败:', err));
    };
</script>

</body>
</html>
